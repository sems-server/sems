# ED-137B Ground Radio Station (GRS) Simulator Configuration
#
# Module: ed137b_grs_sim
# Naming: ED-137B = EUROCAE standard rev B; GRS = Ground Radio Station
#
# Simulates an ED-137B compatible Ground Radio Station
# at the SIP signalling level using R2S (Radio-to-SIP) profile.

# --- GRS Identity ---

# Radio frequency (MHz), included in SDP a=freq attribute
frequency=118.000

# Channel spacing: 25kHz, 8.33kHz
channel_spacing=25kHz

# Transmit/Receive mode: Rx, Tx, RxTx
txrx_mode=RxTx

# Radio type for SDP a=type attribute: Radio, RadioRx, RadioTx
radio_type=Radio

# WG67 version header value (ED-137B R2S)
wg67_version=radio.01.00

# SIP Priority header: normal, non-urgent, urgent, emergency
priority=normal

# --- BSS (Best Signal Selection) ---

# BSS mode: bss, or empty to disable
bss=

# Squelch control type: sqcNormal, sqcCouple, or empty
squelch_control=

# Climax (best signal) state: yes/no
climax=no

# --- Audio ---

# Audio mode: tone (generates side-tone) or silence
audio_mode=tone

# Tone frequency in Hz (used when audio_mode=tone)
tone_freq=400

# --- Logging ---

# Dedicated log file for ED-137B GRS signalling changes
# All frequency changes, mode changes, etc. are logged here
log_file=/var/log/sems/ed137b_grs_sim.log
